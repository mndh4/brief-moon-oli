<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Brief!</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="auth">
  <input type="email" id="auth-email" placeholder="ton@email.com"/>
  <button onclick="sendLink()">Recevoir le lien</button>
  <div id="auth-msg"></div>
</div>

<div id="app" style="display:none;">
  <h1>Connecté 🎉</h1>
  <button onclick="signOut()">Se déconnecter</button>
</div>

<script>
const SUPA_URL='https://lrjiliaoxbotbftdrexi.supabase.co';
const SUPA_KEY='YOUR_ANON_KEY_HERE';

const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

// Send Magic Link
async function sendLink() {
  const email = document.getElementById('auth-email').value;
  const msg = document.getElementById('auth-msg');

  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: window.location.origin
    }
  });

  if (error) {
    msg.innerText = error.message;
  } else {
    msg.innerText = "Email envoyé 🚀";
  }
}

// Handle Magic Link return
window.addEventListener('load', async () => {
  const url = window.location.href;
  console.log("URL retour:", url);

  if (url.includes('code=')) {
    const code = new URL(url).searchParams.get('code');
    await supabase.auth.exchangeCodeForSession(code);
  }

  if (url.includes('token_hash=')) {
    const params = new URLSearchParams(window.location.search);
    await supabase.auth.verifyOtp({
      token_hash: params.get('token_hash'),
      type: params.get('type')
    });
  }

  const { data } = await supabase.auth.getSession();

  if (data.session) {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }
});

// Logout
async function signOut() {
  await supabase.auth.signOut();
  location.reload();
}
</script>

</body>
</html>
